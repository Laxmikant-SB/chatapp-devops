apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatapp-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatapp-client
  template:
    metadata:
      labels:
        app: chatapp-client
    spec:
      containers:
        - name: chatapp-client
          image: laxmikant07/chatapp-client:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: chatapp-client-service
spec:
  type: NodePort
  selector:
    app: chatapp-client
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
